services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        WWWUSER: ${WWWUSER:-1000}
        WWWGROUP: ${WWWGROUP:-1000}
    image: bulk-order-processing-app
    pull_policy: never
    container_name: bulk-order-processing-app
    ports:
      - "7000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-bulk_order_processing}
      DB_USERNAME: ${DB_USERNAME:-app}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      SESSION_DRIVER: database
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-false}
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy

